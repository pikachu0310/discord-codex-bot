name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: ${{ matrix.task.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task:
          - name: Format
            cmd: deno task fmt --check
          - name: Lint
            cmd: deno task lint
          - name: TypeCheck
            cmd: deno task check
          - name: Test
            cmd: deno task test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
          cache: true

      - name: Run ${{ matrix.task.name }}
        run: ${{ matrix.task.cmd }}
